name: Publish to Maven Central

on:
  # Manual runs only, from the Actions tab.
  workflow_dispatch:

permissions:
  # Needs write access to push the release tag back to the repository.
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read package coordinates
        id: coords
        run: |
          F=carousel/build.gradle.kts
          GROUP=$(sed -n 's/.*groupId = "\([^"]*\)".*/\1/p' "$F")
          ARTIFACT=$(sed -n 's/.*artifactId = "\([^"]*\)".*/\1/p' "$F")
          VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' "$F")
          if [ -z "$GROUP" ] || [ -z "$ARTIFACT" ] || [ -z "$VERSION" ]; then
            echo "::error::Could not read coordinates from $F (group='$GROUP' artifact='$ARTIFACT' version='$VERSION')."
            exit 1
          fi
          echo "Publishing $GROUP:$ARTIFACT:$VERSION"
          echo "group=$GROUP" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import GPG signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          # Fail fast; never trace commands (avoids leaking the key via `set -x`).
          set -eu
          # Allow headless (loopback) signing with gpg 2.x.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          printf '%s\n' "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          # Decode the key to a private, mode-600 temp file, import it, then delete it.
          # The key is never echoed to stdout; it only flows through files/pipes.
          umask 077
          keyfile="$(mktemp)"
          trap 'rm -f "$keyfile"' EXIT
          base64 --decode <<< "$SIGNING_KEY_BASE64" > "$keyfile"
          gpg --batch --import "$keyfile"
          # Print only public key metadata (ids/uids) for verification — no secret material.
          gpg --list-keys --keyid-format long

      - name: Build release
        run: ./gradlew :carousel:assembleRelease --stacktrace

      - name: Publish and release to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
        run: >
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
          -Psigning.gnupg.executable=gpg
          -Psigning.gnupg.keyName="$SIGNING_KEY_ID"

      - name: Verify availability on Maven Central
        env:
          GROUP: ${{ steps.coords.outputs.group }}
          ARTIFACT: ${{ steps.coords.outputs.artifact }}
          VERSION: ${{ steps.coords.outputs.version }}
        run: |
          GROUP_PATH=$(echo "$GROUP" | tr '.' '/')
          URL="https://repo1.maven.org/maven2/$GROUP_PATH/$ARTIFACT/$VERSION/$ARTIFACT-$VERSION.pom"
          echo "Checking $URL"
          # Sync from the Central Portal to repo1 can take a while; poll until it appears.
          for i in $(seq 1 60); do
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' "$URL")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "::notice::$GROUP:$ARTIFACT:$VERSION is available on Maven Central."
              exit 0
            fi
            sleep 30
          done
          echo "::error::$GROUP:$ARTIFACT:$VERSION not available on Maven Central after timeout."
          exit 1

      - name: Tag release on main
        # Runs only from the main branch, and only after the version has been
        # confirmed available on Maven Central (previous steps must have succeeded).
        if: github.ref == 'refs/heads/main'
        env:
          VERSION: ${{ steps.coords.outputs.version }}
        run: |
          set -eu
          # Tag name matches the build version exactly (e.g. 1.0.7).
          TAG="$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Bump the version in carousel/build.gradle.kts."
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "::notice::Tagged $GITHUB_SHA as $TAG"
